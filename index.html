<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICFTE</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Poppins', sans-serif;
      background:#8a3f14;
      color:#e8e3df;
    }

    section {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
    }

    .hero {
      position:relative;
    }

    .artist {
      font-size:14px;
      letter-spacing:2px;
      margin-bottom:20px;
      opacity:0.8;
    }

    .title {
      font-size:18vw;
      font-weight:600;
      line-height:0.9;
      color:#d9d3cf;
    }

    .tracklist {
      margin-top:40px;
      font-size:14px;
      line-height:1.6;
      letter-spacing:1px;
    }

    .tracklist p {
      margin:2px 0;
    }

    .cover-art {
      position:absolute;
      bottom:0;
      right:0;
      width:260px;
      opacity:0.9;
    }

    footer {
      position:absolute;
      bottom:20px;
      left:20px;
      font-size:12px;
      opacity:0.7;
    }

    @media (max-width:768px) {
      .title { font-size:28vw; }
      .cover-art { width:180px; }
    }

  </style>
</head>
<body>

<section class="hero">

  <div class="artist">ANDY WHELAN VITA</div>

  <div class="title">ICFTE</div>

  <div class="tracklist">
    <p>Tourist</p>
    <p>It Takes Two</p>
    <p>Never Too Far</p>
    <p>If I Could</p>
    <p>Look Ahead</p>
  </div>

  <img src="Cover.png" class="cover-art" alt="cover art">

  <footer>@ICFTE</footer>

</section>

</body>
</html>
