<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICFTE</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Poppins', sans-serif;
      background:#8a3f14; /* clean flat background */
      color:#e8e3df;
      overflow:hidden;
    }

    .container {
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px;
    }

    .content {
      position:relative;
      z-index:2;
      max-width:800px;
    }

    .artist {
      font-size:14px;
      letter-spacing:2px;
      margin-bottom:20px;
      opacity:0.8;
    }

    .title {
      font-size:18vw;
      font-weight:600;
      line-height:0.9;
      color:#d9d3cf;
    }

    .tracklist {
      margin-top:40px;
      font-size:14px;
      line-height:1.6;
      letter-spacing:1px;
    }

    .tracklist p { margin:3px 0; }

    /* CHARACTER IMAGE (BOTTOM RIGHT, NON-INTRUSIVE) */
    .character {
      position:absolute;
      bottom:0;
      right:0;
      width:35vw;
      max-width:420px;
      pointer-events:none;
      z-index:1;
    }

    footer {
      position:absolute;
      bottom:20px;
      left:20px;
      font-size:12px;
      opacity:0.7;
      z-index:2;
    }

    @media (max-width:768px) {
      .title { font-size:28vw; }
      .character { width:60vw; opacity:0.9; }
    }

  </style>
</head>
<body>

<div class="container">

  <div class="content">
    <div class="artist">ANDY WHELAN VITA</div>
    <div class="title">ICFTE</div>

    <div class="tracklist">
      <p>Tourist</p>
      <p>It Takes Two</p>
      <p>Never Too Far</p>
      <p>If I Could</p>
      <p>Look Ahead</p>
    </div>
  </div>

  <!-- IMPORTANT: use a CUTOUT PNG (transparent background) -->
  <img src="woman-cutout.png" class="character" alt="figure">

  <footer>@ICFTE</footer>

</div>

</body>
</html>
